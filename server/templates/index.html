<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas 🤖 — Chatbot IA</title>
  <style>
    /* ───────────────────────────────────────────
       Reset & Variables
    ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary:   #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary:  #0f3460;
      --bubble-bot:   #2d2d44;
      --bubble-user:  #6c63ff;
      --accent:       #6c63ff;
      --accent-hover: #5a52e0;
      --text-primary: #e0e0e0;
      --text-muted:   #9a9ab0;
      --border:       #2d2d50;
      --shadow:       0 4px 20px rgba(0, 0, 0, 0.4);
      --radius:       18px;
      --radius-sm:    10px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ───────────────────────────────────────────
       Layout principal
    ─────────────────────────────────────────── */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
      background: var(--bg-secondary);
      box-shadow: var(--shadow);
    }

    /* ───────────────────────────────────────────
       Header
    ─────────────────────────────────────────── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-avatar {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ───────────────────────────────────────────
       Zone de messages
    ─────────────────────────────────────────── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 5px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    /* ───────────────────────────────────────────
       Bulles de messages
    ─────────────────────────────────────────── */
    .message {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.bot .message-avatar {
      background: var(--accent);
    }

    .message.user .message-avatar {
      background: #3a3a5c;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.bot .bubble {
      background: var(--bubble-bot);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
      align-self: flex-end;
    }

    .message-wrapper {
      display: flex;
      flex-direction: column;
    }

    .message.user .message-wrapper {
      align-items: flex-end;
    }

    /* ───────────────────────────────────────────
       Animation "typing"
    ─────────────────────────────────────────── */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-bubble {
      background: var(--bubble-bot);
      padding: 12px 16px;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ───────────────────────────────────────────
       Zone de saisie
    ─────────────────────────────────────────── */
    .chat-input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #messageInput {
      flex: 1;
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }

    #messageInput::placeholder {
      color: var(--text-muted);
    }

    #messageInput:focus {
      border-color: var(--accent);
    }

    #sendBtn {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      background: var(--accent-hover);
    }

    #sendBtn:active {
      transform: scale(0.95);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ───────────────────────────────────────────
       Message de bienvenue
    ─────────────────────────────────────────── */
    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .welcome-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome-subtitle {
      font-size: 14px;
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion-chip {
      background: var(--bubble-bot);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .suggestion-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ───────────────────────────────────────────
       Responsive
    ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .chat-container {
        border-radius: 0;
      }

      .message {
        max-width: 90%;
      }

      .welcome-message {
        padding: 20px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">

    <!-- En-tête -->
    <header class="chat-header">
      <div class="header-avatar">🤖</div>
      <div class="header-info">
        <div class="header-title">Atlas</div>
        <div class="header-subtitle">Assistant IA — codé from scratch</div>
      </div>
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">En ligne</span>
      </div>
    </header>

    <!-- Zone de messages -->
    <div class="chat-messages" id="chatMessages">
      <!-- Message de bienvenue (masqué dès le 1er message) -->
      <div class="welcome-message" id="welcomeMsg">
        <div class="welcome-icon">🤖</div>
        <div class="welcome-title">Bonjour, je suis Atlas !</div>
        <div class="welcome-subtitle">
          Un chatbot IA codé entièrement from scratch.<br/>
          Pose-moi une question ou clique sur une suggestion ci-dessous !
        </div>
        <div class="suggestions">
          <span class="suggestion-chip" onclick="sendSuggestion('Qui es-tu ?')">Qui es-tu ?</span>
          <span class="suggestion-chip" onclick="sendSuggestion('Raconte une blague')">😂 Blague</span>
          <span class="suggestion-chip" onclick="sendSuggestion('Dis-moi un fun fact')">🧠 Fun fact</span>
          <span class="suggestion-chip" onclick="sendSuggestion('Recommande-moi un jeu')">🎮 Jeux</span>
          <span class="suggestion-chip" onclick="sendSuggestion('Mon PC est lent')">💻 PC lent</span>
          <span class="suggestion-chip" onclick="sendSuggestion('Inspire-moi')">✨ Citation</span>
        </div>
      </div>

      <!-- Indicateur de frappe -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="message-avatar" style="background: var(--accent); width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;">🤖</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <!-- Zone de saisie -->
    <div class="chat-input-area">
      <textarea
        id="messageInput"
        placeholder="Écris ton message..."
        rows="1"
        autocomplete="off"
      ></textarea>
      <button id="sendBtn" title="Envoyer">➤</button>
    </div>

  </div>

  <script>
    // ─────────────────────────────────────────────────
    // Références DOM
    // ─────────────────────────────────────────────────
    const chatMessages   = document.getElementById('chatMessages');
    const messageInput   = document.getElementById('messageInput');
    const sendBtn        = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const welcomeMsg     = document.getElementById('welcomeMsg');
    const statusDot      = document.getElementById('statusDot');
    const statusText     = document.getElementById('statusText');

    let welcomeShown = true;

    // ─────────────────────────────────────────────────
    // Utilitaires
    // ─────────────────────────────────────────────────

    /** Retourne l'heure actuelle formatée HH:MM */
    function now() {
      return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    }

    /** Fait défiler la zone de messages jusqu'en bas */
    function scrollDown() {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    /** Crée et insère une bulle de message dans la zone de chat */
    function appendMessage(text, type) {
      // Masquer le message de bienvenue au premier échange
      if (welcomeShown) {
        welcomeMsg.style.display = 'none';
        welcomeShown = false;
      }

      const msgEl = document.createElement('div');
      msgEl.className = `message ${type}`;

      const avatarEl = document.createElement('div');
      avatarEl.className = 'message-avatar';
      avatarEl.textContent = type === 'bot' ? '🤖' : '👤';

      const wrapperEl = document.createElement('div');
      wrapperEl.className = 'message-wrapper';

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';
      bubbleEl.textContent = text;   // textContent pour éviter les XSS

      const timeEl = document.createElement('span');
      timeEl.className = 'message-time';
      timeEl.textContent = now();

      wrapperEl.appendChild(bubbleEl);
      wrapperEl.appendChild(timeEl);

      msgEl.appendChild(avatarEl);
      msgEl.appendChild(wrapperEl);

      // Insérer avant l'indicateur de frappe
      chatMessages.insertBefore(msgEl, typingIndicator);
      scrollDown();
    }

    /** Affiche/masque l'indicateur de frappe */
    function setTyping(visible) {
      if (visible) {
        typingIndicator.classList.add('visible');
        scrollDown();
      } else {
        typingIndicator.classList.remove('visible');
      }
    }

    /** Met à jour l'indicateur de statut */
    function setStatus(online) {
      if (online) {
        statusDot.style.background = '#4caf50';
        statusText.textContent = 'En ligne';
      } else {
        statusDot.style.background = '#f44336';
        statusText.textContent = 'Hors ligne';
      }
    }

    // ─────────────────────────────────────────────────
    // Communication avec le serveur
    // ─────────────────────────────────────────────────

    async function sendMessage(text) {
      if (!text.trim()) return;

      // Désactiver l'input pendant l'envoi
      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.disabled = true;

      // Afficher le message de l'utilisateur
      appendMessage(text, 'user');

      // Afficher l'animation de frappe
      setTyping(true);

      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await resp.json();

        // Simuler un délai de réflexion (100-600ms) pour un effet naturel
        await new Promise(r => setTimeout(r, 100 + Math.random() * 500));

        setTyping(false);

        if (resp.ok) {
          appendMessage(data.response, 'bot');
          setStatus(true);
        } else {
          appendMessage('⚠️ Erreur : ' + (data.error || 'Réponse inattendue du serveur.'), 'bot');
        }

      } catch (err) {
        setTyping(false);
        appendMessage('❌ Impossible de contacter Atlas. Vérifie que le serveur est démarré.', 'bot');
        setStatus(false);
      } finally {
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    /** Envoie un message pré-rempli via les suggestions */
    function sendSuggestion(text) {
      sendMessage(text);
    }

    // ─────────────────────────────────────────────────
    // Événements
    // ─────────────────────────────────────────────────

    sendBtn.addEventListener('click', () => {
      sendMessage(messageInput.value);
    });

    messageInput.addEventListener('keydown', (e) => {
      // Entrée seule = envoyer ; Shift+Entrée = saut de ligne
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(messageInput.value);
      }
    });

    // Auto-resize du textarea
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    });

    // ─────────────────────────────────────────────────
    // Healthcheck au démarrage
    // ─────────────────────────────────────────────────

    (async function checkHealth() {
      try {
        const resp = await fetch('/health');
        const data = await resp.json();
        setStatus(data.status === 'ok');
      } catch {
        setStatus(false);
      }
    })();
  </script>
</body>
</html>
